version: 0.2

env:
  variables:
    # static env vars available in all phases
    REGION: us-east-1
  parameter-store:
    # secrets pulled from SSM Parameter Store at build start
    DB_PASSWORD: /myapp/db-password

phases:
  install:
    runtime-versions:
      python: 3.11    # tell CodeBuild which runtime to activate
    commands:
      - pip install pytest    # install test dependencies

  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_URI
      # set up kubectl
      - aws eks update-kubeconfig --region $REGION --name $CLUSTER_NAME

  build:
    commands:
      - echo "Running tests..."
      - pytest tests/
      - echo "Building Docker image..."
      - docker build -t $ECR_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION .

  post_build:
    commands:
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          docker push $ECR_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
          kubectl set image deployment/eks-demo-app eks-demo-app=$ECR_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
        fi

artifacts:
  files:
    - imagedefinitions.json    # passed to next pipeline stage