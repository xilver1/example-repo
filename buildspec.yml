version: 0.2

phases:
  install:
    commands:
      - echo "No additional tools needed for build stage"

  pre_build:
    commands:
      - echo "Authenticating to ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_URI
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - export IMAGE_URI=$ECR_REPOSITORY_URI:$IMAGE_TAG
      - echo "Image URI will be $IMAGE_URI"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $IMAGE_URI .
      - docker tag $IMAGE_URI $ECR_REPOSITORY_URI:latest

  post_build:
    commands:
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "Pushing image to ECR..."
          docker push $IMAGE_URI
          docker push $ECR_REPOSITORY_URI:latest
          printf '{"ImageURI":"%s"}' $IMAGE_URI > imagedetail.json
          cat imagedetail.json
        else
          echo "Build failed, skipping push"
          exit 1
        fi

artifacts:
  files:
    - imagedetail.json